<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Role-play Player</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="app" class="min-h-screen flex flex-col items-center justify-center p-4">
        <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg overflow-hidden flex flex-col h-[750px] relative">
            
            <!-- SETUP VIEW -->
            <div id="setup-view" class="flex flex-col h-full w-full absolute inset-0 bg-white z-10">
                <div class="bg-emerald-600 p-4 text-white">
                    <h1 class="text-xl font-bold text-center">Role-play Player</h1>
                </div>
                <div class="p-6 flex-1 flex flex-col gap-4 overflow-y-auto">
                    <div class="bg-blue-50 text-blue-800 p-4 rounded-lg text-sm border border-blue-100 shadow-sm">
                        <p class="font-bold mb-2 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" x2="8" y1="13" y2="13"></line><line x1="16" x2="8" y1="17" y2="17"></line><line x1="10" x2="8" y1="9" y2="9"></line></svg> 
                            How to use
                        </p>
                        <p>Write your conversation script below. The app will generate a role-play interface.</p>
                        <ul class="list-disc pl-5 mt-2 opacity-90 space-y-1">
                            <li>Use <code>A: </code> and <code>B: </code> to indicate speakers.</li>
                            <li>Please write in Japanese (Hiragana, Katakana, Kanji).</li>
                            <li>Use <code>【 】</code> for situational notes or titles.</li>
                        </ul>
                    </div>
                    
                    <div class="flex-1 flex flex-col">
                        <label class="text-sm font-bold text-gray-600 mb-1">Your Script:</label>
                        <textarea id="script-input" class="flex-1 w-full p-4 border-2 border-gray-200 rounded-lg focus:border-emerald-500 focus:outline-none font-mono text-sm resize-none shadow-inner"></textarea>
                    </div>
                    
                    <button id="btn-load-script" onclick="handleLoadScript()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-md transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        Generate Role-play
                    </button>
                </div>
            </div>

            <!-- PLAY VIEW -->
            <div id="play-view" class="hidden flex-col h-full w-full absolute inset-0 bg-white z-20">
                <!-- Header -->
                <div class="bg-emerald-600 p-4 text-white">
                    <div class="flex items-center justify-between mb-3">
                        <button onclick="handleEditScript()" class="text-emerald-100 hover:text-white flex items-center gap-1 text-sm font-bold bg-emerald-700/50 px-2 py-1 rounded transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>
                            Edit Script
                        </button>
                        <h1 class="text-xl font-bold text-center flex-1 mr-20">Practice</h1>
                    </div>
                    
                    <div class="flex bg-emerald-700 rounded-lg p-1">
                        <button id="btn-role-a" onclick="handleRoleChange('A')" class="flex-1 py-2 text-sm font-bold rounded flex justify-center items-center gap-2 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            You are A
                        </button>
                        <button id="btn-role-b" onclick="handleRoleChange('B')" class="flex-1 py-2 text-sm font-bold rounded flex justify-center items-center gap-2 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                            You are B
                        </button>
                    </div>
                </div>

                <!-- Script Display Area -->
                <div class="flex-1 overflow-y-auto p-4 bg-[#f0f2f5]">
                    <div id="dialog-container" class="max-w-md mx-auto">
                        <!-- Dialogs will be injected here by JavaScript -->
                    </div>
                </div>

                <!-- Control Panel -->
                <div id="control-panel" class="bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
                    <!-- Controls will be injected here by JavaScript -->
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- Security & Formatting ---
        const escapeHtml = (unsafe) => {
            if (!unsafe) return '';
            return unsafe.toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        };

        // --- State Management ---
        let appState = 'setup'; 
        let dialogs = [];
        let userRole = 'A';
        let isPlaying = false;
        let currentIndex = -1;
        let status = 'idle'; 
        let userRecords = {};

        let recognition = null;
        let synth = window.speechSynthesis;
        let stepTimeout = null;
        
        let sttRetryCount = 0;
        let isSttActive = false;

        // iOS Bug Fix: Keep utterance in global scope to prevent GC
        let currentUtterance = null;

        const DEFAULT_SCRIPT = `【Greeting Example】
A: おはようございます。
B: おはようございます。
A: おげんきですか？
B: はい、げんきです。`;

        // --- Helper: Parse Script ---
        const parseScript = (scriptText) => {
            return scriptText.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0)
                .map((line, index) => {
                    if (line.startsWith('【')) return { id: index, speaker: 'system', text: line };
                    if (line.match(/^[AＡaａ][:：]/)) {
                        return { id: index, speaker: 'A', text: line.replace(/^[AＡaａ][:：]/, '').trim() };
                    }
                    if (line.match(/^[BＢbｂ][:：]/)) {
                        return { id: index, speaker: 'B', text: line.replace(/^[BＢbｂ][:：]/, '').trim() };
                    }
                    return { id: index, speaker: 'system', text: line };
                });
        };

        // --- Speech Recognition Init ---
        function initSTT() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                recognition = new SpeechRecognition();
                recognition.lang = 'ja-JP';
                recognition.continuous = true;
                recognition.interimResults = false;

                recognition.onstart = () => {
                    isSttActive = true;
                    sttRetryCount = 0;
                };
                
                recognition.onerror = (e) => {
                    console.warn('Speech Recognition Error:', e.error);
                    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
                        sttRetryCount = 999; 
                    }
                };

                recognition.onresult = (event) => {
                    if (!isPlaying) return;
                    const currentLine = dialogs[currentIndex];
                    if (status === 'listening' && currentLine && currentLine.speaker === userRole) {
                        const lastResult = event.results[event.results.length - 1];
                        const text = lastResult[0].transcript;
                        if (text.trim()) {
                            userRecords[currentIndex] = text;
                            setStatus('idle');
                            updateDialogsUI(); 
                            if (isPlaying) {
                                setCurrentIndex(currentIndex + 1);
                            }
                        }
                    }
                };

                recognition.onend = () => {
                    isSttActive = false;
                    if (isPlaying && sttRetryCount < 3) {
                        sttRetryCount++;
                        setTimeout(() => {
                            if (isPlaying && !isSttActive) {
                                try { recognition.start(); } catch(e){}
                            }
                        }, 500);
                    }
                };
            }
        }

        // --- TTS Helpers ---
        function getJapaneseVoice() {
            const voices = synth.getVoices();
            // Try to find a Japanese voice explicitly
            return voices.find(v => v.lang.includes('ja') || v.lang.includes('JP')) || null;
        }

        // --- State Setters ---
        function setStatus(newStatus) {
            if (status === newStatus) return;
            status = newStatus;
            updateControlsUI();
        }

        function setIsPlaying(val) {
            if (isPlaying === val) return;
            isPlaying = val;
            updateUI();
        }

        function setCurrentIndex(newIndex) {
            const prevIndex = currentIndex;
            currentIndex = newIndex;
            if (prevIndex !== currentIndex) {
                updateDialogsUI();
                updateControlsUI();
                processCurrentStep();
            }
        }

        // --- Core Progression Logic ---
        function processCurrentStep() {
            clearTimeout(stepTimeout);
            if (!isPlaying || dialogs.length === 0 || currentIndex < 0) return;

            if (currentIndex >= dialogs.length) {
                setIsPlaying(false);
                setCurrentIndex(-1);
                setStatus('idle');
                try { recognition.abort(); } catch(e){}
                return;
            }

            const currentLine = dialogs[currentIndex];
            if (!currentLine) return;

            setTimeout(() => {
                const el = document.getElementById(`line-wrapper-${currentIndex}`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 50);

            if (currentLine.speaker === 'system') {
                stepTimeout = setTimeout(() => {
                    if (isPlaying) setCurrentIndex(currentIndex + 1);
                }, 600);
                return;
            }

            if (currentLine.speaker !== userRole) {
                // AI Turn
                setStatus('speaking');
                
                currentUtterance = new SpeechSynthesisUtterance(currentLine.text);
                currentUtterance.lang = 'ja-JP';
                currentUtterance.rate = 1.0;
                
                const jpVoice = getJapaneseVoice();
                if (jpVoice) currentUtterance.voice = jpVoice;
                
                currentUtterance.onend = () => {
                    setStatus('idle');
                    if (isPlaying) {
                        stepTimeout = setTimeout(() => setCurrentIndex(currentIndex + 1), 100);
                    }
                };
                
                currentUtterance.onerror = () => {
                    setStatus('idle');
                    if (isPlaying) {
                        stepTimeout = setTimeout(() => setCurrentIndex(currentIndex + 1), 500);
                    }
                };

                synth.speak(currentUtterance);
            } else {
                // User Turn
                setStatus('listening');
            }
        }

        // --- UI Updaters ---
        function updateUI() {
            const setupView = document.getElementById('setup-view');
            const playView = document.getElementById('play-view');
            if (appState === 'setup') {
                setupView.classList.remove('hidden');
                setupView.classList.add('flex');
                playView.classList.add('hidden');
                playView.classList.remove('flex');
            } else {
                setupView.classList.add('hidden');
                setupView.classList.remove('flex');
                playView.classList.remove('hidden');
                playView.classList.add('flex');
                const btnA = document.getElementById('btn-role-a');
                const btnB = document.getElementById('btn-role-b');
                btnA.className = `flex-1 py-2 text-sm font-bold rounded flex justify-center items-center gap-2 transition-colors ${userRole === 'A' ? 'bg-white text-emerald-700 shadow' : 'text-emerald-100 hover:bg-emerald-600'}`;
                btnB.className = `flex-1 py-2 text-sm font-bold rounded flex justify-center items-center gap-2 transition-colors ${userRole === 'B' ? 'bg-white text-emerald-700 shadow' : 'text-emerald-100 hover:bg-emerald-600'}`;
                btnA.disabled = isPlaying;
                btnB.disabled = isPlaying;
                updateDialogsUI();
                updateControlsUI();
            }
        }

        function renderDialogsInitial() {
            const container = document.getElementById('dialog-container');
            container.innerHTML = '';
            dialogs.forEach((line, idx) => {
                const div = document.createElement('div');
                div.id = `line-wrapper-${idx}`;
                container.appendChild(div);
            });
            const padding = document.createElement('div');
            padding.className = 'h-32';
            container.appendChild(padding);
            updateDialogsUI();
        }

        function updateDialogsUI() {
            dialogs.forEach((line, idx) => {
                const wrapper = document.getElementById(`line-wrapper-${idx}`);
                if (!wrapper) return;
                const isCurrent = idx === currentIndex;
                const isPast = idx < currentIndex;
                const isMyRole = line.speaker === userRole;
                const opacityClass = (isPlaying && !isCurrent && !isPast) ? 'opacity-30' : 'opacity-100';

                if (line.speaker === 'system') {
                    wrapper.className = `text-center my-4 font-bold text-gray-500 text-sm transition-opacity ${opacityClass}`;
                    wrapper.innerHTML = escapeHtml(line.text);
                    return;
                }

                const myRoleBg = isMyRole 
                    ? (isCurrent ? 'bg-green-500 text-white ring-4 ring-green-200' : 'bg-green-400 text-white') 
                    : (isCurrent ? 'bg-white text-gray-800 ring-4 ring-blue-100' : 'bg-white text-gray-800');

                const recordHtml = (isMyRole && userRecords[idx]) ? `
                    <div class="mt-2 pt-2 border-t border-green-300 text-sm bg-green-600/30 rounded p-2 text-white">
                        <span class="text-xs opacity-80 block mb-1">Your pronunciation:</span>
                        <div class="font-medium">${escapeHtml(userRecords[idx])}</div>
                    </div>
                ` : '';

                const bounceHtml = isCurrent ? `
                    <div class="absolute -left-8 top-1/2 -translate-y-1/2 text-xl animate-bounce">
                        ${isMyRole ? '🎤' : '🗣️'}
                    </div>
                ` : '';

                wrapper.innerHTML = `
                    <div class="flex w-full mb-4 ${isMyRole ? 'justify-end' : 'justify-start'} transition-opacity duration-300 ${opacityClass}">
                        <div class="max-w-[80%] rounded-2xl px-4 py-3 relative shadow-sm ${myRoleBg}">
                            <div class="text-xs font-bold mb-1 ${isMyRole ? 'text-green-100' : 'text-gray-400'}">
                                ${escapeHtml(line.speaker)} ${isMyRole ? '(You)' : ''}
                            </div>
                            <div class="text-lg leading-relaxed font-medium tracking-wide">${escapeHtml(line.text)}</div>
                            ${recordHtml}${bounceHtml}
                        </div>
                    </div>
                `;
            });
        }

        function updateControlsUI() {
            const panel = document.getElementById('control-panel');
            if (!isPlaying) {
                panel.innerHTML = `
                    <button onclick="handleStart()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 shadow-lg text-lg transition-transform hover:scale-[1.02]">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        Start Role-play
                    </button>
                `;
            } else {
                let statusHTML = status === 'speaking' ? '<span class="text-blue-500">AI is speaking... 🗣️</span>' : 
                                 status === 'listening' ? '<span class="text-red-500 animate-pulse">Your turn! Please speak 🎤</span>' : '<span>Ready...</span>';
                const currentLine = dialogs[currentIndex];
                const isMyTurn = currentLine && currentLine.speaker === userRole;
                let controlsHtml = `<button onclick="handleStop()" class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 rounded-xl flex items-center justify-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect></svg>Stop</button>`;
                if (isMyTurn) {
                    controlsHtml += (status === 'idle' ? `<button onclick="handleManualMic()" class="flex-1 bg-red-100 text-red-600 border border-red-300 font-bold py-3 rounded-xl flex items-center justify-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" x2="12" y1="19" y2="22"></line></svg>Again</button>` : '') + 
                                     `<button onclick="handleManualNext()" class="flex-1 bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-3 rounded-xl flex items-center justify-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" x2="19" y1="5" y2="19"></line></svg>Skip</button>`;
                }
                panel.innerHTML = `<div class="flex flex-col gap-3"><div class="text-center font-bold text-gray-600 h-6">${statusHTML}</div><div class="flex gap-2">${controlsHtml}</div></div>`;
            }
        }

        // --- Event Handlers ---
        function handleLoadScript() {
            const text = document.getElementById('script-input').value;
            const parsed = parseScript(text);
            if (parsed.length > 0) {
                dialogs = parsed; appState = 'play'; userRecords = {};
                setIsPlaying(false); currentIndex = -1; status = 'idle';
                renderDialogsInitial(); updateUI();
            }
        }
        function handleEditScript() { handleStop(); appState = 'setup'; updateUI(); }
        
        function handleStart() {
            // iOS Fix: Unlock Speech Synthesis on user interaction
            const unlockUtterance = new SpeechSynthesisUtterance("");
            synth.speak(unlockUtterance);

            userRecords = {};
            sttRetryCount = 0;
            try { recognition.start(); } catch(e){}
            setIsPlaying(true);
            setCurrentIndex(0);
        }
        
        function handleStop() { setIsPlaying(false); currentIndex = -1; status = 'idle'; synth.cancel(); try { recognition.abort(); } catch(e){} }
        function handleManualNext() { synth.cancel(); setCurrentIndex(currentIndex + 1); }
        function handleManualMic() { try { recognition.stop(); setTimeout(() => recognition.start(), 100); } catch(e){} }
        function handleRoleChange(role) { if (isPlaying) return; userRole = role; updateUI(); }

        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('script-input').value = DEFAULT_SCRIPT;
            initSTT(); updateUI();
            document.getElementById('script-input').addEventListener('input', (e) => {
                const btn = document.getElementById('btn-load-script');
                const isEmpty = e.target.value.trim() === '';
                btn.disabled = isEmpty;
                btn.classList.toggle('opacity-50', isEmpty);
                btn.classList.toggle('cursor-not-allowed', isEmpty);
            });
        });
    </script>
</body>
</html>
